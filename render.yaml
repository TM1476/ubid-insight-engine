version: 1
services:
  # 1. The Python Backend (FastAPI)
  - type: web
    name: ubid-backend-api
    env: python
    buildCommand: "pip install -r backend/requirements.txt"
    startCommand: "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: "3.10.0"

  # 2. The React Frontend (Static Site)
  - type: static
    name: ubid-insight-dashboard
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    publishPath: "frontend/build"
    routes:
      - type: rewrite
        source: "/*"
        destination: "/index.html"
